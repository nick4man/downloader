<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#1A1814">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icon.svg">
  <title>DOWNLOADER · operator panel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --paper: #F4EDE0;
      --paper2: #EAE2D2;
      --paper3: #FBF7EE;
      --hairline: #C9C0AF;
      --ink: #1A1814;
      --bar: #3D352B;
      --mute: #6F665B;
      --line: #2A2722;
      --amber: #C97E0F;
      --amber-soft: #F2D8A3;
      --red: #A92E1A;
      --ok: #2F7A3F;
      --grip: rgba(26,24,20,.28);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--paper);
      background-image: radial-gradient(circle, var(--hairline) 1px, transparent 1.5px);
      background-size: 14px 14px;
      color: var(--ink);
      font-family: "JetBrains Mono", ui-monospace, "Cascadia Code", Menlo, monospace;
      font-size: 14px;
      line-height: 1.45;
      font-feature-settings: "tnum";
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }
    /* paper grain */
    body::before {
      content: "";
      position: fixed; inset: 0; pointer-events: none; z-index: 1;
      background: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/></svg>");
      opacity: 0.06; mix-blend-mode: multiply;
    }
    .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px 60px; position: relative; z-index: 2; }

    /* TOPBAR */
    .topbar {
      background: var(--bar); color: var(--paper);
      position: sticky; top: 0; z-index: 10;
      border-bottom: 1px solid var(--ink);
    }
    .topinner {
      max-width: 1080px; margin: 0 auto; padding: 14px 24px;
      display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
    }
    .brand { display: flex; align-items: baseline; gap: 12px; }
    .brand .name {
      font-weight: 700; font-size: 22px; letter-spacing: -0.01em;
      text-transform: uppercase;
    }
    .brand .sub {
      font-weight: 400; font-size: 12px; color: rgba(244,237,224,.55);
      text-transform: uppercase; letter-spacing: 0.1em;
    }
    .counts { display: flex; gap: 22px; margin-left: auto; }
    .counts span {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em;
      color: rgba(244,237,224,.7);
      display: inline-flex; align-items: baseline; gap: 7px;
    }
    .counts b { font-size: 17px; font-weight: 700; color: var(--paper); font-feature-settings: "tnum"; }
    .counts span[data-state="running"] b { color: var(--amber); }
    .counts span[data-state="error"] b { color: #ff8a73; }
    .counts span[data-state="completed"] b { color: #9dd9a9; }

    /* INTAKE */
    .intake {
      display: grid;
      grid-template-columns: 1fr 110px 88px 220px auto auto;
      gap: 1px;
      background: var(--line);
      margin: 24px 0 0;
      border: 1px solid var(--line);
    }
    .field {
      background: var(--paper);
      padding: 10px 14px;
      display: flex; flex-direction: column; gap: 6px;
      min-width: 0;
    }
    .field label {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--mute); font-weight: 500;
    }
    .field input[type="text"], .field input[type="number"] {
      border: 0; background: transparent; color: var(--ink);
      font: 500 14px "JetBrains Mono", monospace;
      outline: none; padding: 2px 0;
      width: 100%;
    }
    .field input::placeholder { color: var(--mute); opacity: 0.55; }
    .field.f-a { align-items: flex-start; justify-content: space-between; }
    .switch { display: inline-flex; align-items: center; }
    .switch input {
      appearance: none; -webkit-appearance: none;
      width: 36px; height: 18px;
      background: var(--paper2); border: 1px solid var(--line);
      position: relative; cursor: pointer; margin: 0;
    }
    .switch input:checked { background: var(--amber); border-color: var(--amber); }
    .switch input::after {
      content: ""; position: absolute; top: 1px; left: 1px;
      width: 14px; height: 14px; background: var(--ink);
      transition: transform 0.15s ease;
    }
    .switch input:checked::after { transform: translateX(18px); background: var(--paper); }

    .btn {
      border: 0; cursor: pointer;
      font: 700 12px "JetBrains Mono", monospace;
      text-transform: uppercase; letter-spacing: 0.12em;
      padding: 0 22px;
    }
    .btn-engage { background: var(--ink); color: var(--paper); }
    .btn-engage:hover { background: var(--amber); color: var(--ink); }
    .btn-ghost { background: var(--paper2); color: var(--ink); }
    .btn-ghost:hover { background: var(--paper3); }

    /* CONFIG */
    .config {
      background: var(--paper2);
      border: 1px solid var(--line);
      border-top: 0;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: 1fr 120px 120px auto auto;
      gap: 14px;
      align-items: end;
    }
    .config h3 {
      grid-column: 1 / -1;
      margin: 0 0 4px;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--mute); font-weight: 500;
    }
    .config label {
      display: flex; flex-direction: column; gap: 5px;
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--mute);
    }
    .config input {
      border: 1px solid var(--line); background: var(--paper);
      padding: 8px 10px;
      font: 500 13px "JetBrains Mono", monospace;
      color: var(--ink); outline: none;
    }
    .config input:focus { background: #fff; }
    .config .btn { padding: 10px 16px; }
    #s-msg {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
      color: var(--ok);
    }

    /* JOB LIST */
    #list { margin-top: 28px; }
    .job {
      display: grid;
      grid-template-columns: 24px 52px minmax(0,1fr) 300px 70px auto;
      gap: 16px;
      align-items: center;
      padding: 14px 18px;
      background: var(--paper);
      border: 1px solid var(--hairline);
      border-bottom: none;
      transition: background 0.15s;
    }
    .job:last-child { border-bottom: 1px solid var(--hairline); }
    .job:hover { background: var(--paper3); }
    .grip {
      color: var(--grip); font-size: 18px; cursor: grab;
      user-select: none; text-align: center; line-height: 1;
    }
    .grip:active { cursor: grabbing; }
    .seq {
      font-weight: 700; font-size: 11px;
      color: var(--mute);
      letter-spacing: 0.04em;
      font-feature-settings: "tnum";
    }
    .meta { min-width: 0; }
    .name {
      font-size: 14px; font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .url {
      font-size: 11px; color: var(--mute);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }
    .err-line {
      font-size: 11px; color: var(--red); font-weight: 500;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 4px; cursor: copy;
      font-family: "JetBrains Mono", monospace;
    }
    .err-line::before { content: "⚠ "; opacity: 0.7; }
    .progress { display: flex; flex-direction: column; gap: 4px; min-width: 0; }
    .track {
      height: 10px; background: var(--paper2);
      border: 1px solid var(--line);
      position: relative; overflow: hidden;
    }
    .fill {
      height: 100%;
      background: var(--ink);
      width: 0;
      transition: width 0.4s ease;
      position: relative;
    }
    .job[data-state="running"] .fill { background: var(--amber); }
    .job[data-state="completed"] .fill { background: var(--ok); }
    .job[data-state="error"] .fill { background: var(--red); }
    .job[data-state="running"] .fill::after {
      content: ""; position: absolute; inset: 0;
      background: repeating-linear-gradient(
        -45deg, transparent 0 6px, rgba(26,24,20,.18) 6px 12px
      );
      animation: tape 0.8s linear infinite;
    }
    @keyframes tape {
      from { background-position: 0 0; }
      to { background-position: 17px 0; }
    }
    .pstats {
      font-size: 11px; color: var(--ink);
      letter-spacing: 0.02em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-feature-settings: "tnum";
    }
    .job[data-state="queued"] .pstats,
    .job[data-state="paused"] .pstats,
    .job[data-state="canceled"] .pstats { color: var(--mute); }
    .job[data-state="completed"] .pstats { color: var(--ok); }

    .stamp {
      font-size: 10px; font-weight: 700; letter-spacing: 0.14em;
      padding: 5px 8px;
      border: 1px solid var(--line);
      background: var(--paper);
      text-transform: uppercase;
      text-align: center; line-height: 1;
    }
    .job[data-state="queued"] .stamp { color: var(--ink); }
    .job[data-state="running"] .stamp { background: var(--amber); color: var(--ink); border-color: var(--amber); }
    .job[data-state="completed"] .stamp { background: var(--ok); color: var(--paper); border-color: var(--ok); }
    .job[data-state="error"] .stamp { background: var(--red); color: var(--paper); border-color: var(--red); }
    .job[data-state="paused"] .stamp {
      background: repeating-linear-gradient(-45deg, var(--paper2) 0 4px, var(--paper) 4px 8px);
      color: var(--mute);
    }
    .job[data-state="canceled"] .stamp { background: var(--paper2); color: var(--mute); }

    .acts { display: flex; gap: 1px; }
    .act {
      border: 1px solid var(--hairline);
      background: var(--paper);
      color: var(--mute);
      cursor: pointer;
      font: 600 16px "JetBrains Mono", monospace;
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0; line-height: 1;
    }
    .act:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .act.danger { color: var(--red); font-size: 22px; font-weight: 700; }
    .act.danger:hover { background: var(--red); color: var(--paper); border-color: var(--red); }

    .empty {
      padding: 70px 20px;
      text-align: center;
      color: var(--mute);
      font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
      border: 1px dashed var(--hairline);
      margin-top: 28px;
    }

    /* FOOTER */
    footer {
      margin-top: 36px;
      border: 1px solid var(--line);
      background: var(--paper3);
      font-size: 12px;
    }
    .frow {
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 16px; align-items: center;
      padding: 12px 16px;
    }
    .frow + .frow { border-top: 1px solid var(--hairline); }
    .frow .tag {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.14em;
      color: var(--mute); font-weight: 700;
    }
    .frow .body { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; }
    footer a {
      color: var(--ink); border-bottom: 1px solid var(--hairline);
      text-decoration: none; padding-bottom: 1px;
    }
    footer a:hover { color: var(--amber); border-color: var(--amber); }
    .sep { color: var(--hairline); }
    #cookies { font: 11px "JetBrains Mono", monospace; color: var(--ink); max-width: 200px; }
    #cookies-status {
      font-size: 10px; text-transform: uppercase;
      letter-spacing: 0.12em; color: var(--mute);
    }
    .mini {
      background: var(--paper2); color: var(--ink);
      border: 1px solid var(--line);
      padding: 4px 9px;
      font: 700 10px "JetBrains Mono", monospace;
      text-transform: uppercase; letter-spacing: 0.1em;
      cursor: pointer;
    }
    .mini:hover { background: var(--ink); color: var(--paper); }
    .mini.danger { color: var(--red); border-color: var(--red); }
    .mini.danger:hover { background: var(--red); color: var(--paper); }

    @media (max-width: 720px) {
      .topinner { gap: 12px; padding: 12px 16px; }
      .counts { gap: 12px; }
      .counts b { font-size: 13px; }
      .wrap { padding: 0 14px 40px; }
      .intake { grid-template-columns: 1fr 1fr; }
      .intake .btn { grid-column: 1 / -1; padding: 12px; }
      .config { grid-template-columns: 1fr 1fr; }
      .job {
        grid-template-columns: 24px 1fr auto;
        grid-template-areas:
          "grip meta stamp"
          "seq  progress progress"
          "acts acts acts";
        column-gap: 12px; row-gap: 10px;
        padding: 12px 14px;
      }
      .grip { grid-area: grip; align-self: start; }
      .seq { grid-area: seq; align-self: center; }
      .meta { grid-area: meta; }
      .progress { grid-area: progress; }
      .stamp { grid-area: stamp; align-self: start; }
      .acts { grid-area: acts; flex-wrap: wrap; }
      .url { display: none; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topinner">
      <div class="brand">
        <span class="name">▼ DOWNLOADER</span>
        <span class="sub">/ operator panel</span>
      </div>
      <div class="counts">
        <span data-state="queued">QUEUE <b id="c-queued">0</b></span>
        <span data-state="running">RUN <b id="c-running">0</b></span>
        <span data-state="completed">DONE <b id="c-completed">0</b></span>
        <span data-state="error">ERR <b id="c-error">0</b></span>
      </div>
    </div>
  </header>

  <div class="wrap">
    <section class="intake">
      <div class="field">
        <label>ССЫЛКА</label>
        <input id="url" type="text" placeholder="paste link…" autocomplete="off" autofocus>
      </div>
      <div class="field">
        <label>КАЧЕСТВО</label>
        <input id="quality" type="number" placeholder="1080">
      </div>
      <div class="field f-a">
        <label>АУДИО</label>
        <label class="switch"><input type="checkbox" id="audio"></label>
      </div>
      <div class="field">
        <label>КАТАЛОГ</label>
        <input id="dir" type="text" placeholder="/auto">
      </div>
      <button class="btn btn-engage" onclick="addJob()">В ОЧЕРЕДЬ ▶</button>
      <button class="btn btn-ghost" onclick="toggleSettings()">CONFIG</button>
    </section>

    <section id="settings" class="config" hidden>
      <h3>// настройки</h3>
      <label>КАТАЛОГ ПО УМОЛЧАНИЮ<input id="s-dir"></label>
      <label>КАЧЕСТВО<input id="s-quality" type="number"></label>
      <label>ПАРАЛЛЕЛЬНО<input id="s-concurrent" type="number"></label>
      <button class="btn btn-engage" onclick="saveSettings()">СОХРАНИТЬ</button>
      <span id="s-msg"></span>
    </section>

    <section id="list"></section>
    <div id="empty" class="empty" hidden>// очередь пуста · вставь ссылку выше</div>

    <footer>
      <div class="frow">
        <span class="tag">Отправка</span>
        <div class="body">
          📎 <a id="blet" href="#">букмарклет</a>
          <span class="sep">|</span>
          <a href="https://github.com/nick4man/downloader/tree/main/extension">расширение для браузера</a>
          <span class="sep">|</span>
          <a href="https://github.com/nick4man/downloader/blob/main/IOS.md">iOS-ярлык</a>
        </div>
      </div>
      <div class="frow">
        <span class="tag">Очередь</span>
        <div class="body">
          <a href="/jobs/export" download>⤓ экспорт списка</a>
          <span class="sep">|</span>
          <span style="color:var(--mute)">очистить:</span>
          <button class="mini" onclick="clearJobs('completed')">завершённые</button>
          <button class="mini" onclick="clearJobs('error')">с ошибкой</button>
          <button class="mini danger" onclick="clearJobs('all')">всё</button>
        </div>
      </div>
      <div class="frow">
        <span class="tag">Cookies</span>
        <div class="body">
          <input type="file" id="cookies" accept=".txt">
          <span id="cookies-status"></span>
        </div>
      </div>
    </footer>
  </div>

  <script>
    const fmt = n => {
      if (!n) return "0 B";
      const u = ["B", "KiB", "MiB", "GiB", "TiB"]; let i = 0;
      while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
      return n.toFixed(i ? 1 : 0) + " " + u[i];
    };
    const esc = s => (s || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
    const STAMPS = { queued: "QUEUE", running: "RUN", paused: "PAUSE", completed: "DONE", error: "ERR", canceled: "CXL" };

    let lastSig = "";

    function eta(s) {
      s = Math.round(s);
      if (s < 60) return s + "с";
      if (s < 3600) return Math.floor(s / 60) + "м " + (s % 60) + "с";
      return Math.floor(s / 3600) + "ч " + Math.floor((s % 3600) / 60) + "м";
    }

    // Человекочитаемый статус для ЛЮБОГО состояния задачи.
    function liveFields(j) {
      const pct = j.bytes_total ? Math.min(100, Math.round(100 * j.bytes_done / j.bytes_total))
                                : (j.state === "completed" ? 100 : 0);
      let status;
      switch (j.state) {
        case "queued":  status = "⏳ ожидает в очереди"; break;
        case "paused":  status = "⏸ на паузе"; break;
        case "canceled": status = "⊘ отменён"; break;
        case "error":   status = "✗ ошибка — см. ниже"; break;
        case "completed":
          status = "✓ готово · " + fmt(j.bytes_total || j.bytes_done); break;
        case "running": {
          if (!j.bytes_done) { status = "⟳ подключение…"; break; }
          const p = [];
          p.push(j.bytes_total ? `${pct}% · ${fmt(j.bytes_done)} / ${fmt(j.bytes_total)}`
                               : fmt(j.bytes_done));
          if (j.speed) p.push("↓ " + fmt(j.speed) + "/с");
          p.push(j.eta ? "осталось " + eta(j.eta) : (j.speed ? "" : "ожидание данных…"));
          status = p.filter(Boolean).join("  ·  ");
          break;
        }
        default: status = j.state;
      }
      return { pct, status };
    }

    function softUpdate(j) {
      const card = document.querySelector(`.job[data-id="${j.id}"]`);
      if (!card) return false;
      const { pct, status } = liveFields(j);
      const fill = card.querySelector(".fill");
      if (fill) fill.style.width = pct + "%";
      const pst = card.querySelector(".pstats");
      if (pst) pst.textContent = status;
      return true;
    }

    function render(jobs) {
      if (window.__dragging) return;
      const counts = { queued: 0, running: 0, completed: 0, error: 0, paused: 0, canceled: 0 };
      jobs.forEach(j => { counts[j.state] = (counts[j.state] || 0) + 1; });
      ["queued","running","completed","error"].forEach(s => {
        document.getElementById("c-" + s).textContent = counts[s] || 0;
      });
      document.getElementById("empty").hidden = jobs.length > 0;

      // Soft-update: при стабильном составе очереди обновляем только прогресс/stats,
      // не трогая DOM (иначе hover моргает при каждом WS-тике 0.5с).
      const sig = jobs.map(j => `${j.id}:${j.state}`).join("|");
      if (sig && sig === lastSig) {
        jobs.forEach(softUpdate);
        return;
      }
      lastSig = sig;
      document.getElementById("list").innerHTML = jobs.map((j, i) => {
        const { pct, status } = liveFields(j);
        const canPause = j.state === "queued" || j.state === "running";
        const canResume = j.state === "paused" || j.state === "error";
        const seq = "#" + String(i + 1).padStart(3, "0");
        const err = j.state === "error" && j.error
          ? `<div class="err-line" title="${esc(j.error)} (клик — копировать)" onclick="copyErr('${j.id}')">${esc(j.error)}</div>`
          : "";
        return `<div class="job" data-id="${j.id}" data-state="${j.state}" data-error="${esc(j.error || "")}" draggable="true">
          <span class="grip" title="перетащить">≡</span>
          <span class="seq">${seq}</span>
          <div class="meta">
            <div class="name">${j.audio ? "♪ " : ""}${esc(j.filename) || "—"}</div>
            <div class="url">${esc(j.url)}</div>
            ${err}
          </div>
          <div class="progress">
            <div class="track"><div class="fill" style="width:${pct}%"></div></div>
            <div class="pstats">${status}</div>
          </div>
          <span class="stamp">${STAMPS[j.state] || j.state.toUpperCase()}</span>
          <div class="acts">
            <button class="act" onclick="move('${j.id}','up')" title="выше">↑</button>
            <button class="act" onclick="move('${j.id}','down')" title="ниже">↓</button>
            ${canPause ? `<button class="act" onclick="act('${j.id}','pause')" title="пауза">⏸</button>` : ""}
            ${canResume ? `<button class="act" onclick="act('${j.id}','resume')" title="${j.state === 'error' ? 'повторить' : 'возобновить'}">▶</button>` : ""}
            <button class="act" onclick="rename('${j.id}')" title="переименовать">✎</button>
            <button class="act danger" onclick="rm('${j.id}')" title="удалить">×</button>
          </div>
        </div>`;
      }).join("");
    }

    async function addJob() {
      const url = document.getElementById("url").value.trim();
      if (!url) return;
      const q = document.getElementById("quality").value;
      await fetch("/jobs", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          url, quality: q ? +q : null,
          audio: document.getElementById("audio").checked,
          dir: document.getElementById("dir").value.trim() || null,
        }),
      });
      document.getElementById("url").value = "";
      refresh();
    }

    async function toggleSettings() {
      const el = document.getElementById("settings");
      el.hidden = !el.hidden;
      if (el.hidden) return;
      const c = await (await fetch("/config")).json();
      document.getElementById("s-dir").value = c.download_dir;
      document.getElementById("s-quality").value = c.default_quality;
      document.getElementById("s-concurrent").value = c.max_concurrent;
    }

    async function saveSettings() {
      await fetch("/config", {
        method: "PUT", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          download_dir: document.getElementById("s-dir").value.trim(),
          default_quality: +document.getElementById("s-quality").value,
          max_concurrent: +document.getElementById("s-concurrent").value,
        }),
      });
      const m = document.getElementById("s-msg");
      m.textContent = "✓ saved · pool applies after restart";
      setTimeout(() => (m.textContent = ""), 2500);
    }

    async function act(id, verb) { await fetch(`/jobs/${id}/${verb}`, { method: "POST" }); refresh(); }
    async function move(id, dir) {
      await fetch(`/jobs/${id}/move`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ direction: dir }),
      });
      refresh();
    }
    async function rm(id) { await fetch(`/jobs/${id}`, { method: "DELETE" }); refresh(); }
    async function copyErr(id) {
      const card = document.querySelector(`.job[data-id="${id}"]`);
      const text = card?.dataset.error || "";
      if (!text) return;
      try { await navigator.clipboard.writeText(text); alert("Скопировано:\n\n" + text); }
      catch { alert(text); }
    }
    async function clearJobs(state) {
      const label = { error: "ошибки", completed: "завершённые", all: "ВСЕ задачи" }[state] || state;
      if (!confirm(`Удалить ${label}?`)) return;
      const r = await fetch("/jobs?state=" + encodeURIComponent(state), { method: "DELETE" });
      const d = await r.json();
      refresh();
      if (d.removed === 0) alert("Нечего удалять.");
    }
    async function rename(id) {
      const name = prompt("новое имя файла:");
      if (!name) return;
      await fetch(`/jobs/${id}/rename`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ filename: name }),
      });
      refresh();
    }

    async function refresh() {
      try {
        const r = await fetch("/jobs");
        if (r.status === 401) return askToken();
        render(await r.json());
      } catch {}
    }
    function askToken() {
      const t = prompt("токен доступа (DOWNLOADER_TOKEN):");
      if (t) location.search = "?token=" + encodeURIComponent(t);
    }
    function connectWS() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.onmessage = e => render(JSON.parse(e.data));
      ws.onclose = () => setTimeout(connectWS, 1000);
      ws.onerror = () => ws.close();
    }

    // bookmarklet
    const ck = (document.cookie.match(/(?:^|; )dl_token=([^;]+)/) || [])[1];
    const tok = ck ? decodeURIComponent(ck) : "";
    const headers = tok
      ? "{'Content-Type':'application/json','Authorization':'Bearer " + tok + "'}"
      : "{'Content-Type':'application/json'}";
    document.getElementById("blet").href =
      "javascript:(function(){fetch('" + location.origin +
      "/jobs',{method:'POST',headers:" + headers +
      ",body:JSON.stringify({url:location.href})}).then(function(r){" +
      "alert(r.ok?'sent to downloader':'error '+r.status)})" +
      ".catch(function(e){alert('failed: '+e)})})();";

    // DnD
    const listEl = document.getElementById("list");
    let draggedId = null;
    listEl.addEventListener("dragstart", e => {
      const card = e.target.closest(".job");
      if (card) { draggedId = card.dataset.id; window.__dragging = true; card.style.opacity = "0.5"; }
    });
    listEl.addEventListener("dragover", e => e.preventDefault());
    listEl.addEventListener("dragend", e => {
      window.__dragging = false;
      const card = e.target.closest(".job");
      if (card) card.style.opacity = "";
    });
    listEl.addEventListener("drop", async e => {
      e.preventDefault();
      window.__dragging = false;
      const card = e.target.closest(".job");
      if (!card || !draggedId || card.dataset.id === draggedId) return;
      const ids = [...listEl.querySelectorAll(".job")].map(c => c.dataset.id);
      ids.splice(ids.indexOf(card.dataset.id), 0, ids.splice(ids.indexOf(draggedId), 1)[0]);
      draggedId = null;
      await fetch("/jobs/reorder", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ids }),
      });
      refresh();
    });

    document.getElementById("url").addEventListener("keydown", e => { if (e.key === "Enter") addJob(); });

    async function refreshCookies() {
      try {
        const s = await (await fetch("/cookies")).json();
        document.getElementById("cookies-status").textContent =
          s.present ? `loaded · ${fmt(s.bytes)}` : "not loaded";
      } catch {}
    }
    document.getElementById("cookies").addEventListener("change", async e => {
      const f = e.target.files[0];
      if (!f) return;
      await fetch("/cookies", { method: "POST", body: await f.text() });
      refreshCookies();
    });

    refresh();
    connectWS();
    refreshCookies();
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(() => {});
  </script>
</body>
</html>
