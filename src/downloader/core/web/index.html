<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f1115">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="icon" href="/icon.svg">
  <title>downloader</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0f1115; --surface: #181b21; --surface2: #1f232b; --border: #2a2f38;
      --text: #e8eaed; --muted: #8b929e; --accent: #3b82f6; --accent-h: #2f6fe0;
      --ok: #16a34a; --warn: #b45309; --err: #dc2626;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text);
      font: 14px/1.5 system-ui, -apple-system, "Segoe UI", sans-serif; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 0 16px 40px; }

    header { position: sticky; top: 0; z-index: 5; background: rgba(15,17,21,.92);
      backdrop-filter: blur(8px); border-bottom: 1px solid var(--border); }
    .bar { max-width: 980px; margin: 0 auto; padding: 12px 16px;
      display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .brand { font-size: 17px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
    .grow { flex: 1 1 240px; }
    input, button, select { font: inherit; }
    input[type=text], input#url, input#quality, input#dir, .fld {
      padding: 9px 11px; border-radius: 9px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text); outline: none; }
    input:focus { border-color: var(--accent); }
    input#quality { width: 84px; } input#dir { width: 150px; }
    .chk { display: flex; align-items: center; gap: 6px; color: var(--muted);
      white-space: nowrap; user-select: none; }
    button { padding: 9px 14px; border: 0; border-radius: 9px; background: var(--accent);
      color: #fff; cursor: pointer; font-weight: 600; }
    button:hover { background: var(--accent-h); }
    button.ghost { background: var(--surface2); color: var(--text); font-weight: 500; }
    button.ghost:hover { background: var(--border); }

    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px; margin: 16px 0; }
    .panel h3 { margin: 0 0 12px; font-size: 14px; color: var(--muted); font-weight: 600; }
    .grid { display: flex; gap: 16px; flex-wrap: wrap; align-items: end; }
    .grid label { font-size: 12px; color: var(--muted); display: flex; flex-direction: column; gap: 5px; }

    #list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .job { display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px; }
    .job:hover { border-color: #38404c; }
    .grip { color: #5b626d; cursor: grab; font-size: 16px; flex: 0 0 auto; }
    .meta { flex: 1 1 auto; min-width: 0; }
    .title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sub { color: var(--muted); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .progress { flex: 0 0 200px; }
    .track { height: 7px; border-radius: 4px; background: var(--surface2); overflow: hidden; }
    .fill { height: 100%; background: var(--accent); width: 0; transition: width .3s; }
    .pinfo { font-size: 11px; color: var(--muted); margin-top: 4px; white-space: nowrap; }
    .pill { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 20px; flex: 0 0 auto; }
    .queued { background: #1e3a5f; color: #9cc4ff; } .running { background: #3a3000; color: #f4d35e; }
    .paused { background: #2d3340; color: #aab3c0; } .completed { background: #0f3d24; color: #6ee7a0; }
    .error { background: #4a1414; color: #ff9a9a; } .canceled { background: #2d3340; color: #8b929e; }
    .acts { display: flex; gap: 2px; flex: 0 0 auto; }
    .act { background: none; color: var(--muted); padding: 5px 7px; font-size: 14px; font-weight: 400; border-radius: 7px; }
    .act:hover { color: var(--text); background: var(--surface2); }
    .empty { text-align: center; color: var(--muted); padding: 60px 20px; }

    footer { color: var(--muted); font-size: 12px; margin-top: 28px;
      border-top: 1px solid var(--border); padding-top: 16px; }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
    .frow { margin-top: 8px; }

    @media (max-width: 640px) {
      .progress { flex-basis: 110px; } .sub { display: none; }
      input#dir { display: none; }
    }
  </style>
</head>
<body>
  <header>
    <div class="bar">
      <span class="brand">⬇ downloader</span>
      <input id="url" class="grow" type="text" placeholder="Вставь ссылку…" autofocus>
      <input id="quality" type="number" placeholder="кач-во" title="макс. высота, напр. 1080">
      <label class="chk"><input type="checkbox" id="audio"> аудио</label>
      <input id="dir" type="text" placeholder="каталог (опц.)">
      <button onclick="addJob()">Добавить</button>
      <button class="ghost" onclick="toggleSettings()" title="Настройки">⚙</button>
    </div>
  </header>

  <div class="wrap">
    <section id="settings" class="panel" hidden>
      <h3>Настройки</h3>
      <div class="grid">
        <label>Каталог по умолчанию<input id="s-dir" class="fld" style="width:260px"></label>
        <label>Качество<input id="s-quality" class="fld" type="number" style="width:90px"></label>
        <label>Параллельно<input id="s-concurrent" class="fld" type="number" style="width:90px"></label>
        <button onclick="saveSettings()">Сохранить</button>
        <span id="s-msg" style="color:var(--ok)"></span>
      </div>
    </section>

    <div id="list"></div>
    <div id="empty" class="empty" hidden>Очередь пуста. Вставь ссылку выше — или поделись с телефона.</div>

    <footer>
      <div>
        📎 <a id="blet" href="#">В downloader</a> — перетащи на панель закладок.
        Ещё: <a href="https://github.com/nick4man/downloader/tree/main/extension">расширение</a>,
        <a href="https://github.com/nick4man/downloader/blob/main/IOS.md">iOS-ярлык</a>.
      </div>
      <div class="frow">
        🍪 Cookies (приватное / age-gate):
        <input type="file" id="cookies" accept=".txt">
        <span id="cookies-status"></span>
      </div>
    </footer>
  </div>

  <script>
    const fmt = n => {
      if (!n) return "0 Б";
      const u = ["Б", "КиБ", "МиБ", "ГиБ", "ТиБ"]; let i = 0;
      while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
      return n.toFixed(i ? 1 : 0) + " " + u[i];
    };
    const esc = s => (s || "").replace(/[&<>"]/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

    function progressInfo(j) {
      const parts = [];
      if (j.bytes_total) parts.push(`${fmt(j.bytes_done)} / ${fmt(j.bytes_total)}`);
      else if (j.bytes_done) parts.push(fmt(j.bytes_done));
      if (j.speed) parts.push(fmt(j.speed) + "/с");
      if (j.eta) parts.push("≈" + Math.round(j.eta) + "с");
      return parts.join(" · ");
    }

    function render(jobs) {
      if (window.__dragging) return;
      document.getElementById("empty").hidden = jobs.length > 0;
      document.getElementById("list").innerHTML = jobs.map(j => {
        const pct = j.bytes_total ? Math.min(100, Math.round(100 * j.bytes_done / j.bytes_total)) : 0;
        const done = j.state === "completed";
        const showBar = j.state === "running" || done;
        const bar = showBar
          ? `<div class="track"><div class="fill" style="width:${done ? 100 : pct}%;background:${done ? "var(--ok)" : "var(--accent)"}"></div></div>
             <div class="pinfo">${done ? "✓ " + fmt(j.bytes_total || j.bytes_done) : (pct + "% · " + progressInfo(j))}</div>`
          : `<div class="pinfo">—</div>`;
        const canPause = j.state === "queued" || j.state === "running";
        const canResume = j.state === "paused" || j.state === "error";
        return `<div class="job" draggable="true" data-id="${j.id}">
          <span class="grip" title="Перетащить">⠿</span>
          <div class="meta">
            <div class="title">${j.audio ? "🎵 " : ""}${esc(j.filename) || "—"}</div>
            <div class="sub">${esc(j.url)}</div>
          </div>
          <div class="progress">${bar}</div>
          <span class="pill ${j.state}">${j.state}</span>
          <div class="acts">
            <button class="act" onclick="move('${j.id}','up')" title="Выше">↑</button>
            <button class="act" onclick="move('${j.id}','down')" title="Ниже">↓</button>
            ${canPause ? `<button class="act" onclick="act('${j.id}','pause')" title="Пауза">⏸</button>` : ""}
            ${canResume ? `<button class="act" onclick="act('${j.id}','resume')" title="Возобновить">▶</button>` : ""}
            <button class="act" onclick="rename('${j.id}')" title="Переименовать">✏</button>
            <button class="act" onclick="rm('${j.id}')" title="Удалить">🗑</button>
          </div>
        </div>`;
      }).join("");
    }

    async function addJob() {
      const url = document.getElementById("url").value.trim();
      if (!url) return;
      const q = document.getElementById("quality").value;
      await fetch("/jobs", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          url,
          quality: q ? +q : null,
          audio: document.getElementById("audio").checked,
          dir: document.getElementById("dir").value.trim() || null,
        }),
      });
      document.getElementById("url").value = "";
      refresh();
    }

    async function toggleSettings() {
      const el = document.getElementById("settings");
      el.hidden = !el.hidden;
      if (el.hidden) return;
      const c = await (await fetch("/config")).json();
      document.getElementById("s-dir").value = c.download_dir;
      document.getElementById("s-quality").value = c.default_quality;
      document.getElementById("s-concurrent").value = c.max_concurrent;
    }

    async function saveSettings() {
      await fetch("/config", {
        method: "PUT", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          download_dir: document.getElementById("s-dir").value.trim(),
          default_quality: +document.getElementById("s-quality").value,
          max_concurrent: +document.getElementById("s-concurrent").value,
        }),
      });
      const m = document.getElementById("s-msg");
      m.textContent = "✓ сохранено (пул — после restart)";
      setTimeout(() => (m.textContent = ""), 2500);
    }

    async function act(id, verb) { await fetch(`/jobs/${id}/${verb}`, { method: "POST" }); refresh(); }
    async function move(id, dir) {
      await fetch(`/jobs/${id}/move`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ direction: dir }),
      });
      refresh();
    }
    async function rm(id) { await fetch(`/jobs/${id}`, { method: "DELETE" }); refresh(); }
    async function rename(id) {
      const name = prompt("Новое имя файла:");
      if (!name) return;
      await fetch(`/jobs/${id}/rename`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ filename: name }),
      });
      refresh();
    }

    async function refresh() {
      try {
        const r = await fetch("/jobs");
        if (r.status === 401) return askToken();
        render(await r.json());
      } catch {}
    }
    function askToken() {
      const t = prompt("Токен доступа (DOWNLOADER_TOKEN):");
      if (t) location.search = "?token=" + encodeURIComponent(t);
    }
    function connectWS() {
      const proto = location.protocol === "https:" ? "wss" : "ws";
      const ws = new WebSocket(`${proto}://${location.host}/ws`);
      ws.onmessage = e => render(JSON.parse(e.data));
      ws.onclose = () => setTimeout(connectWS, 1000);
      ws.onerror = () => ws.close();
    }

    // Букмарклет (с токеном из cookie, если включена аутентификация).
    const ck = (document.cookie.match(/(?:^|; )dl_token=([^;]+)/) || [])[1];
    const tok = ck ? decodeURIComponent(ck) : "";
    const headers = tok
      ? "{'Content-Type':'application/json','Authorization':'Bearer " + tok + "'}"
      : "{'Content-Type':'application/json'}";
    document.getElementById("blet").href =
      "javascript:(function(){fetch('" + location.origin +
      "/jobs',{method:'POST',headers:" + headers +
      ",body:JSON.stringify({url:location.href})}).then(function(r){" +
      "alert(r.ok?'Отправлено в downloader':'Ошибка '+r.status)})" +
      ".catch(function(e){alert('Не удалось: '+e)})})();";

    // Drag-and-drop сортировка (порядок шлём целиком на /jobs/reorder).
    const listEl = document.getElementById("list");
    let draggedId = null;
    listEl.addEventListener("dragstart", e => {
      const card = e.target.closest(".job");
      if (card) { draggedId = card.dataset.id; window.__dragging = true; }
    });
    listEl.addEventListener("dragover", e => e.preventDefault());
    listEl.addEventListener("dragend", () => { window.__dragging = false; });
    listEl.addEventListener("drop", async e => {
      e.preventDefault();
      window.__dragging = false;
      const card = e.target.closest(".job");
      if (!card || !draggedId || card.dataset.id === draggedId) return;
      const ids = [...listEl.querySelectorAll(".job")].map(c => c.dataset.id);
      ids.splice(ids.indexOf(card.dataset.id), 0, ids.splice(ids.indexOf(draggedId), 1)[0]);
      draggedId = null;
      await fetch("/jobs/reorder", {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ ids }),
      });
      refresh();
    });

    document.getElementById("url").addEventListener("keydown", e => { if (e.key === "Enter") addJob(); });

    // Cookies: статус + загрузка.
    async function refreshCookies() {
      try {
        const s = await (await fetch("/cookies")).json();
        document.getElementById("cookies-status").textContent =
          s.present ? `загружены (${fmt(s.bytes)})` : "не загружены";
      } catch {}
    }
    document.getElementById("cookies").addEventListener("change", async e => {
      const f = e.target.files[0];
      if (!f) return;
      await fetch("/cookies", { method: "POST", body: await f.text() });
      refreshCookies();
    });

    refresh();
    connectWS();
    refreshCookies();
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("/sw.js").catch(() => {});
  </script>
</body>
</html>
