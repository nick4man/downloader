services:
  downloader:
    build: .
    image: downloader:latest
    ports:
      - "8765:8765"
    volumes:
      # Каталог загрузок на хосте (переопредели через DOWNLOAD_DIR).
      - ${DOWNLOAD_DIR:-./downloads}:/downloads
      # Состояние (SQLite-очередь, реестр хэшей) — именованный том.
      - downloader-data:/data
    environment:
      DOWNLOADER_MAX_CONCURRENT: "3"
      # Включи аутентификацию ПЕРЕД выставлением в интернет/туннель:
      DOWNLOADER_TOKEN: ${DOWNLOADER_TOKEN:-}
    restart: unless-stopped

  # Публичный HTTPS-доступ без проброса портов (для Android-PWA и удалёнки).
  # Нужен токен именованного туннеля из дашборда Cloudflare Zero Trust;
  # в настройках туннеля укажи public hostname → http://downloader:8765.
  # Запускать профилем: docker compose --profile tunnel up -d
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN:-}
    depends_on: [downloader]
    restart: unless-stopped
    profiles: [tunnel]

volumes:
  downloader-data:
